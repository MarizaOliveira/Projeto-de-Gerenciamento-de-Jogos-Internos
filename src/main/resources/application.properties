spring.application.name=jogos_internos

# =================================================
#      CONFIGURA«√O DO BANCO DE DADOS POSTGRESQL
# =================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/bd_jogos_internos_v2
spring.datasource.username=postgres
spring.datasource.password=2003

# =================================================
#      CONFIGURA«√O DO JPA/HIBERNATE
# =================================================
# 'validate' checa se as tabelas do banco correspondem ýs suas classes Java. ”timo para seguranÁa.
spring.jpa.hibernate.ddl-auto=validate

# Mostra no console o SQL que est· sendo executado. ”timo para debug.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
